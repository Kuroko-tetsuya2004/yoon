databases:
  - name: yoon-db
    databaseName: yoon
    user: yoon_user
    plan: free

services:
  - type: redis
    name: yoon-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: yoon-web
    env: docker
    plan: free
    dockerCommand: "php artisan migrate --force && php artisan storage:link && /init"
    envVars:
      - key: APP_NAME
        value: Yoon
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: yoon-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: yoon-redis
          property: connectionString
      - key: CACHE_STORE
        value: redis
      - key: SESSION_DRIVER
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: BROADCAST_CONNECTION
        value: reverb

  - type: worker
    name: yoon-queue
    env: docker
    plan: free
    dockerCommand: "php artisan queue:work --sleep=3 --tries=3"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yoon-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: yoon-redis
          property: connectionString

  - type: web
    name: yoon-reverb
    env: docker
    plan: free
    dockerCommand: "php artisan reverb:start --host=0.0.0.0 --port=8080"
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: yoon-redis
          property: connectionString
