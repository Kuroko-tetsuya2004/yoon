databases:
  - name: yoon-db
    databaseName: yoon
    user: yoon_user
    plan: free

services:
  - type: redis
    name: yoon-redis
    plan: free
    maxmemoryPolicy: noeviction

  - type: web
    name: yoon-web
    env: php
    plan: free
    buildCommand: |
      composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
      npm install
      npm run build
      php artisan key:generate --force
      php artisan migrate --force
      php artisan storage:link
    startCommand: "heroku-php-nginx -C nginx.conf public/"
    envVars:
      - key: APP_NAME
        value: Yoon
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: yoon-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: yoon-redis
          property: connectionString
      - key: CACHE_STORE
        value: redis
      - key: SESSION_DRIVER
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: BROADCAST_CONNECTION
        value: reverb

  - type: worker
    name: yoon-queue
    env: php
    plan: free
    buildCommand: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
    startCommand: "php artisan queue:work --sleep=3 --tries=3"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yoon-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: yoon-redis
          property: connectionString

  - type: web
    name: yoon-reverb
    env: php
    plan: free
    buildCommand: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
    startCommand: "php artisan reverb:start --host=0.0.0.0 --port=$PORT"
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: yoon-redis
          property: connectionString
